# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Install SpatiaLite
      run: sudo apt-get install libsqlite3-mod-spatialite
    - name: Install SpatiaLite 2
      run: sudo apt-get install libspatialite-dev
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      env:
        # Host startup requires this; WebApplicationFactory replaces the DbContext
        # with SQLite in-memory, so the value is only there to pass the null-check.
        ConnectionStrings__StigVidd: "DataSource=:memory:"
      run: |
        dotnet test --no-build
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: app/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Prettier check
      run: npm run format:check
    - name: Lint
      run: npm run lint
    - name: Test
      run: npm test -- --watchAll=false
