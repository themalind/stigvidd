server {
    listen 80;
    server_name _;

    root /data;
    client_max_body_size 64m;

    # Keep PUT body temp files on the same filesystem as the media root so the
    # final rename() doesn't cross a device boundary (see 30-media-setup.sh).
    client_body_temp_path /data/.tmp;

    # Liveness endpoint for the compose healthcheck.
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # Media store.
    #   - GET/HEAD are public (browsers & the app read images here).
    #   - PUT/DELETE/MKCOL/MOVE/COPY require basic auth (only the API writes).
    # create_full_put_path lets the API PUT to "trails/<guid>.jpeg" without
    # having to MKCOL the parent collection first.
    location / {
        dav_methods PUT DELETE MKCOL COPY MOVE;
        create_full_put_path on;
        dav_access user:rw group:rw all:r;
        autoindex off;

        limit_except GET HEAD {
            auth_basic "stigvidd-media";
            auth_basic_user_file /etc/nginx/dav.htpasswd;
        }
    }
}
